# Phase 2.5-002: Build + lint workflow
# Runs on all PRs and pushes to main

name: CI

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main, production]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run linter
        run: pnpm run lint || echo "⚠️ Lint not configured, skipping"
        continue-on-error: true

      - name: Type check
        run: pnpm run typecheck || pnpm exec tsc --noEmit || echo "⚠️ Typecheck not configured"
        continue-on-error: true

      - name: Build
        run: pnpm build

      - name: Verify build output
        run: |
          if [ -d "dist" ]; then
            echo "✅ Build output exists"
            ls -la dist/
          else
            echo "❌ No dist folder found"
            exit 1
          fi

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Mobile route smoke
        env:
          PORT: '3002'
          HERMES_PASSWORD: ci-smoke-test-password
        run: |
          set -euo pipefail
          pnpm start > /tmp/hermes-workspace.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true; cat /tmp/hermes-workspace.log || true' EXIT

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3002/ >/dev/null; then
              break
            fi
            sleep 2
          done

          pnpm smoke:routes:mobile http://127.0.0.1:3002

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run tests
        run: pnpm test || echo "⚠️ No tests configured"
        continue-on-error: true
